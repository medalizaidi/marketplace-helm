apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongo
  labels: { app: mongo }
spec:
  replicas: 1
  strategy: { type: Recreate }
  selector:
    matchLabels: { app: mongo }
  template:
    metadata:
      labels: { app: mongo }
    spec:
      containers:
        - name: mongo
          image: {{ .Values.infra.mongo.image }}
          ports:
            - containerPort: {{ .Values.infra.mongo.port }}
          volumeMounts:
            - name: mongo-data
              mountPath: /data/db
      volumes:
        - name: mongo-data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: mongo
  labels: { app: mongo }
spec:
  selector: { app: mongo }
  ports:
    - port: {{ .Values.infra.mongo.port }}
      targetPort: {{ .Values.infra.mongo.port }}
