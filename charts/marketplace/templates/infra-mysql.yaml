apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
  labels: { app: mysql }
spec:
  replicas: 1
  strategy: { type: Recreate }
  selector:
    matchLabels: { app: mysql }
  template:
    metadata:
      labels: { app: mysql }
    spec:
      containers:
        - name: mysql
          image: {{ .Values.infra.mysql.image }}
          ports:
            - containerPort: {{ .Values.infra.mysql.port }}
          envFrom:
            - secretRef: { name: mysql-secret }
          volumeMounts:
            - name: mysql-data
              mountPath: /var/lib/mysql
          startupProbe:
            exec:
              command: ["mysqladmin", "ping", "-h", "127.0.0.1", "-P", "3306", "--protocol=tcp", "-p{{ .Values.infra.mysql.rootPassword }}"]
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 30
          readinessProbe:
            exec:
              command: ["mysqladmin", "ping", "-h", "127.0.0.1", "-P", "3306", "--protocol=tcp", "-p{{ .Values.infra.mysql.rootPassword }}"]
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 6
          livenessProbe:
            exec:
              command: ["mysqladmin", "ping", "-h", "127.0.0.1", "-P", "3306", "--protocol=tcp", "-p{{ .Values.infra.mysql.rootPassword }}"]
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 6
      volumes:
        - name: mysql-data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: mysql
  labels: { app: mysql }
spec:
  selector: { app: mysql }
  ports:
    - port: {{ .Values.infra.mysql.port }}
      targetPort: {{ .Values.infra.mysql.port }}
